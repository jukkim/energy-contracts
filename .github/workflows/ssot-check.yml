name: SSOT Governance Check

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
      - '**/*.webp'
      - '**/*.mp4'
      - '**/*.webm'
      - '**/*.mov'
      - '**/*.pdf'
      - 'scratch/**'
      - 'archive/**'
      - 'evidence/**'
      - 'presentation/**'
      - 'screenshots/**'
      - 'proposed-figures/**'
      - '.gitignore'
      - 'LICENSE*'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
      - '**/*.webp'
      - '**/*.mp4'
      - '**/*.webm'
      - '**/*.mov'
      - '**/*.pdf'
      - 'scratch/**'
      - 'archive/**'
      - 'evidence/**'
      - 'presentation/**'
      - 'screenshots/**'
      - 'proposed-figures/**'
      - '.gitignore'
      - 'LICENSE*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate SSOT (strategy + ports + schemas + generated drift)
        run: python scripts/validate_ssot.py --check all

      - name: Check _generated_constants drift across 6 projects
        run: |
          if [ -d ../edge-agent ] || [ -d ../building-energy-3d ]; then
            python scripts/gen_constants.py --check
          else
            echo "Sibling project repos not present in this CI checkout — skip"
          fi
