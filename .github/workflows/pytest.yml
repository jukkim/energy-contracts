name: pytest

# AI 챔피언 CI 감사(2026-06-09) HIGH gap — SSOT 허브인 본 repo 의 tests/(critics·schemas·
# gen_constants·validate_ssot 런타임 로직)가 어떤 workflow 에서도 실행되지 않던 갭 해소.
# ssot-check.yml/ssot-drift.yml 은 gen_constants --check 만 돌려 pytest 미커버였음.

on:
  # Minimal mode 2026-06-09 ~ 2026-06-30 — Actions 한도 보호 (한도 90% 도달 사고 후).
  # PR/push 트리거 일시 제거. schedule 주 2회 (KST 화/금 02:00) + manual dispatch 만 유지.
  # 2026-07-01 reset 후 PR/push 트리거 원복 (revert PR 미리 준비).
  # SSOT: ~/.claude/rules/github-actions-budget.md 작성 룰 #6
  schedule:
    - cron: "0 17 * * 1,4"  # UTC Mon/Thu 17:00 = KST Tue/Fri 02:00
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: "lint (ruff F — pyflakes 실버그: undefined name / unused import·var)"
        # 스타일 아닌 실버그(F821 undefined 등)만 select → 노이즈 없이 회귀 차단.
        run: ruff check energy_contracts/ scripts/ --select F

      - name: pytest (critics / schemas / gen_constants / validate_ssot 런타임 로직)
        env:
          PYTHONIOENCODING: utf-8
        run: pytest tests/ -q --tb=short
