name: pytest

# AI 챔피언 CI 감사(2026-06-09) HIGH gap — SSOT 허브인 본 repo 의 tests/(critics·schemas·
# gen_constants·validate_ssot 런타임 로직)가 어떤 workflow 에서도 실행되지 않던 갭 해소.
# ssot-check.yml/ssot-drift.yml 은 gen_constants --check 만 돌려 pytest 미커버였음.

on:
  # Full CI 복원 (2026-06-17) — self-hosted 러너 오프로드로 Actions 한도 무관($0). minimal mode
  # (한도 보호) 목적 해소 → PR/push 트리거 조기 원복. schedule 은 보조 안전망 유지.
  # SSOT: ~/.claude/rules/github-actions-budget.md
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.svg'
      - '**/*.pdf'
      - 'scratch/**'
      - 'archive/**'
      - '.gitignore'
      - 'LICENSE*'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.svg'
      - '**/*.pdf'
      - 'scratch/**'
      - 'archive/**'
      - '.gitignore'
      - 'LICENSE*'
  schedule:
    - cron: "0 17 * * 1,4"  # UTC Mon/Thu 17:00 = KST Tue/Fri 02:00 (보조 안전망)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: "lint (ruff F — pyflakes 실버그: undefined name / unused import·var)"
        # 스타일 아닌 실버그(F821 undefined 등)만 select → 노이즈 없이 회귀 차단.
        run: ruff check energy_contracts/ scripts/ --select F

      - name: pytest (critics / schemas / gen_constants / validate_ssot 런타임 로직)
        env:
          PYTHONIOENCODING: utf-8
        run: pytest tests/ -q --tb=short
