# Spectral SSOT Linting Config (Phase L-1)
# https://github.com/stoplightio/spectral
# JSON Schema 2020-12 전용 자체 ruleset — OpenAPI/AsyncAPI overlay 제외
# 실행: spectral lint "schemas/*.json"

functions: []

# JSON Schema는 spectral 기본 format 아님 → format 함수 자체 정의
# 우리 모든 schema는 root에 $schema/title/$id 보유 → 단일 format으로 처리
aliases:
  RootSchema:
    - "$"
  PropertyName:
    - "$..properties[*]~"

rules:
  # ── SSOT 거버넌스 핵심 룰 ─────────────────────────────────────────────

  ssot-must-have-schema:
    description: "$schema must be JSON Schema 2020-12 draft"
    given: "$"
    severity: error
    then:
      field: $schema
      function: pattern
      functionOptions:
        match: "json-schema\\.org/draft/2020-12"

  ssot-must-have-id:
    description: "$id must be 'energy-contracts/<name>.json'"
    given: "$"
    severity: error
    then:
      field: $id
      function: pattern
      functionOptions:
        match: "^energy-contracts/[a-z][a-z0-9_]*\\.json$"

  ssot-must-have-title:
    description: "All schemas must declare title"
    given: "$"
    severity: error
    then:
      field: title
      function: truthy

  ssot-must-have-version:
    description: "Schemas must declare semver version"
    given: "$"
    severity: warn
    then:
      field: version
      function: truthy

  ssot-must-have-default:
    description: "SSOT schemas should provide a 'default' block for runtime values"
    given: "$"
    severity: warn
    then:
      field: default
      function: defined

  # ── 명명 규약 (Karpathy: 일관성) ──────────────────────────────────────

  ssot-snake-case-properties:
    description: "Property names should be snake_case ($-prefixed JSON Schema keywords 제외)"
    given: "#PropertyName"
    severity: warn
    then:
      function: pattern
      functionOptions:
        match: "^[a-z][a-z0-9_]*$|^\\$"

  ssot-no-trailing-whitespace-id:
    description: "$id must not contain trailing slash"
    given: "$"
    severity: warn
    then:
      field: $id
      function: pattern
      functionOptions:
        notMatch: "/$"

  # ── 보안·정책 룰 ──────────────────────────────────────────────────────

  ssot-no-wildcard-cors:
    description: "CORS default_origins/production_origins must not contain '*'"
    given: "$..origins[*]"
    severity: error
    then:
      function: pattern
      functionOptions:
        notMatch: "^\\*$"

  ssot-jwt-min-secret-32:
    description: "JWT min_secret_length must be >= 32 (cryptographic safety)"
    given: "$..jwt.min_secret_length"
    severity: error
    then:
      function: schema
      functionOptions:
        schema:
          type: integer
          minimum: 32

  # ── 전략 코드 ─────────────────────────────────────────────────────────

  ssot-strategy-pattern:
    description: "EMS strategy enum must match M00~M20 pattern"
    given: "$..['StrategyCode'].enum[*]"
    severity: error
    then:
      function: pattern
      functionOptions:
        match: "^M(0[0-9]|1[0-9]|20)$"

