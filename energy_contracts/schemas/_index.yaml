# 사냥꾼 라운드 LOW (2026-06-08): 기존엔 58 schema 중 31 만 등재 + title/주석 카운트가
#   31/26/실제 불일치였다 → schemas/*.json 전수 등재 + 카운트 일치.
#   재발 방지: validate_ssot.check_index_completeness 가 (entry 수 == .json 파일 수) 가드.

