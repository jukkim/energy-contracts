# SSOT 31 도메인 카탈로그 인덱스 (Phase L-5 + Policy Evaluation Contract)
# Redocly·Swagger UI·문서 렌더링용. 각 schema 파일을 참조.

openapi: 3.1.0
info:
  title: myjob SSOT Governance — 26 Domain Catalog
  version: '1.0.0'
  description: |
    Phase A~K SSOT 거버넌스 카탈로그. JSON Schema 2020-12 기반.

    - **Phase A~G (8 도메인)**: ems_strategies, port_allocation, common, agent_contracts, nl_intents, run_modes, data_classification, test_classification
    - **Phase I (5)**: ai_model_registry, auth_scopes, error_response (RFC 7807), mqtt_topics, security_policy
    - **Phase J (7)**: computer_profile, building_usage_map, i18n_keys, tenant_regions, auth_policy, pipeline_status, energy_units
    - **Phase K (6)**: tests_shared, logging_format, simulation_scenarios, db_migrations, openapi_responses, lint_format

  license:
    name: Proprietary

servers:
  - url: https://building-energy.xyz/api/v1
    description: Production API
  - url: http://localhost:8000/api/v1
    description: Local dev

