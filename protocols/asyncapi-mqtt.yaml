asyncapi: '3.1.0'
info:
  title: myjob MQTT Topics SSOT
  version: '1.0.0'
  description: |
    AsyncAPI 3.0 표준으로 작성된 워크스페이스 MQTT 토픽 SSOT (Phase L-3).
    `schemas/mqtt_topics.json` 의 통일 표현. Specmatic·AsyncAPI CLI 호환.

    검증: `asyncapi validate protocols/asyncapi-mqtt.yaml`
    문서: `asyncapi generate fromTemplate protocols/asyncapi-mqtt.yaml @asyncapi/html-template`

servers:
  mqtt-broker:
    host: localhost:1883
    protocol: mqtt
    description: 워크스페이스 공유 MQTT 브로커
    security:
      - type: scramSha256
        description: PLACEHOLDER — 현재 anonymous, Phase L에서 강제 도입 권고

channels:
  gridbridge_telemetry:
    address: gridbridge/telemetry/{ven_id}
    description: EdgeAgent → GridBridge 텔레메트리
    parameters:
      ven_id:
        $ref: '#/components/parameters/VenId'
    messages:
      telemetry:
        $ref: '#/components/messages/Telemetry'

  gridbridge_command:
    address: gridbridge/command/{ven_id}
    description: GridBridge → EdgeAgent 제어 명령
    parameters:
      ven_id:
        $ref: '#/components/parameters/VenId'
    messages:
      command:
        $ref: '#/components/messages/Command'

  fleet_register:
    address: fleet/register/{ven_id}
    description: EdgeAgent 등록 (retained)
    parameters:
      ven_id:
        $ref: '#/components/parameters/VenId'
    messages:
      registration:
        $ref: '#/components/messages/Registration'

  fleet_heartbeat:
    address: fleet/heartbeat/{ven_id}
    description: EdgeAgent heartbeat (30초)
    parameters:
      ven_id:
        $ref: '#/components/parameters/VenId'

  agentleague_challenge:
    address: agentleague/challenge/{challenge_id}/result
    description: AgentLeague 챌린지 결과
    parameters:
      challenge_id:
        $ref: '#/components/parameters/ChallengeId'

  eduarena_match:
    address: eduarena/match/{match_id}/event
    description: EduArena 매치 이벤트
    parameters:
      match_id:
        $ref: '#/components/parameters/MatchId'

components:
  parameters:
    VenId:
      description: VEN ID — common.json#VenId pattern 매칭
      enum: []
    ChallengeId:
      description: AgentLeague 챌린지 ID
      enum: []
    MatchId:
      description: EduArena 매치 ID
      enum: []

  messages:
    Telemetry:
      contentType: application/json
      description: "EdgeAgent → GridBridge 텔레메트리. 실 schema는 schemas/telemetry.json 참조"
      payload:
        type: object
        properties:
          ven_id:   {type: string}
          ts:       {type: string, format: date-time}
          power_kw: {type: number}
          temp_c:   {type: number}
    Command:
      contentType: application/json
      description: "GridBridge → EdgeAgent 제어 명령. schemas/control_command.json"
      payload:
        type: object
        properties:
          ven_id:   {type: string}
          strategy: {type: string, pattern: "^M(0[0-9]|1[0-5])$"}
          hvac_setpoint: {type: number, minimum: 18, maximum: 30}
    Registration:
      contentType: application/json
      description: "EdgeAgent 등록 (retained). schemas/edge_registration.json"
      payload:
        type: object
        properties:
          ven_id:   {type: string}
          backend:  {type: string, enum: [virtual, replay, energyplus, real_bas]}
          version:  {type: string}

  securitySchemes:
    scramSha256:
      type: scramSha256
      description: MQTT broker SCRAM-SHA-256 인증 (권고, 미강제)
